<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper & Scissors</title>
    <link rel="stylesheet" href="style.css"> <!-- linking html and css -->
</head>
<body>
    <header>
        <h1>Rock - Paper - Scissors !!</h1>
    </header> <br><br><br>

    <div id="container">
        <div id="image-block">
            <img src="rock.png" alt="rock" class="img" id="rock">
            <img src="paper.png" alt="paper" class="img" id="paper">
            <img src="scissors.png" alt="scissor" class="img" id="scissor">
        </div>
        <br><br><br>

        <div id="score">
            <div id="user">0</div>
            <div>:</div> 
            <div id="comp">0</div> 
        </div>
        <div id="name">
            <div>You</div> 
            <div>Comp</div> 
        </div>
        <br><br><br>

        <div style="display: flex; justify-content: space-between; width: 500px;">
            <div id="text-box" style="width: 200px;">Pick Your Move</div>
            <button id="reset">Reset</button>
        </div>
        <br><br><br>
    </div>

    <footer>
        <h4>Developed by @Priti Gupta | Contact : pritigupta9753@gmail.com | Phone : (+91) 7278291717</h4>
    </footer>

    <script src="app.js"></script> <!-- linking html and js -->
</body>
</html>
